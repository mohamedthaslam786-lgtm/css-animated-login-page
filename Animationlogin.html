<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holographic Tilt — Login V2 (A+B mix)</title>
  <link rel="stylesheet" href="./login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    .themes button[data-theme="theme-neon"] {
      --sw1: #ff2770;
      --sw2: #45f3ff;
    }
    .themes button[data-theme="theme-aurora"] {
      --sw1: #8a5cff;
      --sw2: #3ad6ff;
    }
    .themes button[data-theme="theme-sunset"] {
      --sw1: #ff6a3d;
      --sw2: #ffd166;
    }
    .themes button[data-theme="theme-emerald"] {
      --sw1: #22e3a3;
      --sw2: #7dff9b;
    }
    .themes button[data-theme="theme-royal"] {
      --sw1: #c9a227;
      --sw2: #9b5cff;
    }
    .themes button[data-theme="theme-mono"] {
      --sw1: #e8e8ef;
      --sw2: #9aa3b2;
    }
  </style>
</head>
<body>

  <main class="stage">
    <div class="card theme-neon" id="card" tabindex="-1">

      <!-- soft drifting aurora (from option A) -->
      <div class="layer aurora" aria-hidden="true">
        <span class="blob blob-a"></span>
        <span class="blob blob-b"></span>
        <span class="blob blob-c"></span>
      </div>

      <!-- faint neon rays, masked to edges (toned-down option B) -->
      <div class="layer rings" aria-hidden="true"></div>

      <!-- glass panel -->
      <div class="layer panel"></div>

      <!-- animated border beam -->
      <div class="layer beam" aria-hidden="true"></div>

      <!-- holographic sheen tracks cursor -->
      <div class="layer sheen" aria-hidden="true"></div>

      <!-- reveal = clipping plane -->
      <div class="layer reveal">

        <h2 class="title">
          <i class="fa-solid fa-right-to-bracket" aria-hidden="true"></i>
          <span>Login</span>
          <i class="fa-solid fa-heart heart" aria-hidden="true"></i>
        </h2>

        <form class="fields" action="#" method="post" novalidate>
          <div class="field">
            <i class="fa-solid fa-user field-icon" aria-hidden="true"></i>
            <input id="username" name="username" type="text" placeholder=" " autocomplete="username" required>
            <label for="username">Username</label>
          </div>

          <div class="field">
            <i class="fa-solid fa-lock field-icon" aria-hidden="true"></i>
            <input id="password" name="password" type="password" placeholder=" " autocomplete="current-password" required>
            <label for="password">Password</label>
            <button type="button" class="toggle-pw" aria-label="Show password" aria-pressed="false">
              <i class="fa-solid fa-eye" aria-hidden="true"></i>
            </button>
          </div>

          <button type="submit" class="submit">
            <span>Sign in</span>
            <i class="fa-solid fa-arrow-right-long" aria-hidden="true"></i>
          </button>

          <div class="group">
            <a href="#">Forgot password?</a>
            <a href="#" class="accent">Sign up</a>
          </div>
        </form>

      </div>

    </div>
  </main>

  <!-- theme switcher -->
  <div class="themes" role="group" aria-label="Theme">
    <button data-theme="theme-neon"    class="active" style="--sw1:#ff2770;--sw2:#45f3ff" title="Neon"></button>
    <button data-theme="theme-aurora"  style="--sw1:#8a5cff;--sw2:#3ad6ff" title="Aurora"></button>
    <button data-theme="theme-sunset"  style="--sw1:#ff6a3d;--sw2:#ffd166" title="Sunset"></button>
    <button data-theme="theme-emerald" style="--sw1:#22e3a3;--sw2:#7dff9b" title="Emerald"></button>
    <button data-theme="theme-royal"   style="--sw1:#c9a227;--sw2:#9b5cff" title="Royal Gold"></button>
    <button data-theme="theme-mono"    style="--sw1:#e8e8ef;--sw2:#9aa3b2" title="Platinum"></button>
  </div>

  <script>
    const card = document.getElementById('card');
    const MAX = 6;                        // gentler tilt
    let raf = null;

    function onMove(e) {
      const r = card.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width;
      const py = (e.clientY - r.top) / r.height;
      const ry = (px - 0.5) * 2 * MAX;
      const rx = (0.5 - py) * 2 * MAX;
      if (raf) cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        card.style.setProperty('--rx', rx.toFixed(2) + 'deg');
        card.style.setProperty('--ry', ry.toFixed(2) + 'deg');
        card.style.setProperty('--mx', (px * 100).toFixed(1) + '%');
        card.style.setProperty('--my', (py * 100).toFixed(1) + '%');
      });
    }
    function reset() {
      card.style.setProperty('--rx', '0deg');
      card.style.setProperty('--ry', '0deg');
      card.style.setProperty('--mx', '50%');
      card.style.setProperty('--my', '50%');
    }
    if (window.matchMedia('(pointer: fine)').matches) {
      card.addEventListener('pointermove', onMove);
      card.addEventListener('pointerleave', reset);
    }
    reset();

    // theme switcher
    const themeBtns = document.querySelectorAll('.themes button');
    themeBtns.forEach(b => b.addEventListener('click', () => {
      card.className = 'card ' + b.dataset.theme;
      themeBtns.forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    }));

    // password toggle
    const btn = document.querySelector('.toggle-pw');
    const pw = document.getElementById('password');
    btn.addEventListener('click', () => {
      const show = pw.type === 'password';
      pw.type = show ? 'text' : 'password';
      btn.setAttribute('aria-pressed', String(show));
      btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
      btn.querySelector('i').className = show ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
    });
  </script>

</body>
</html>
